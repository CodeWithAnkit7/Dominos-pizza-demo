<!DOCTYPE html>
<html lang="en">

<head>

            margin-left: 80px;
        }

        .container h5 {
            margin-left: 80px;
            font-size: 18px;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(52, 48, 48);
            margin-top: 40px;
        }

        .category {
            display: flex;
            margin-left: 35px;
        }

            height: 30px;
            margin-top: 61px;
        }

            margin-right: 20px;

        }

            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 63px;
            margin-left: 5px;
        }

        }

            height: 20px;

            margin-left: 70px;
            height: 45px;
            font-size: 25px;
            border: 1px solid gray;
        }

        #num {
            margin-top: 6px;
            font-size: 27px;
        }

        #input2 {
            width: 280px;
            height: 17px;
            color: black;
            height: 45px;
            font-size: 30px;
            cursor: context-menu;
            text-align: start;
        }
        #buttoninfo{
            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 100px;
            margin-left: 80px;
        }
        .buttoninfo button{
            width: 360px;
            height: 40px;
            margin-left: 44px;
            margin-top: 20px;
            font-size: 20px;
            color: white;
            background-color: gray;
            border: none;
            border-radius: 4px;

        }
    </style>
</head>

<body>

            <div id="cat1" class="cat1">
